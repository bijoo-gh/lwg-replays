name: Sync and Index Replays

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Single job: the previous two-job design tarred the synced replays across an
# artifact boundary and untarred them over a fresh checkout, which never
# deleted Drive-removed files and reset their mtimes every run (ghost entries
# + a junk commit every 12h).
jobs:
  sync-and-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_SERVICE_ACCOUNT: ${{ secrets.RCLONE_SERVICE_ACCOUNT }}
        run: bash .github/gha_scripts/setup_rclone.sh

      - name: Sync replays from Google Drive
        run: bash .github/gha_scripts/sync_replays.sh

      - name: Rebuild index
        run: python3 lwg-replay-indexer/lwg_replay_indexer/indexer.py docs/replays/ docs/replays/index.json

      - name: Commit and push changes
        run: bash .github/gha_scripts/commit_changes.sh

      - name: Trigger GitHub Pages rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/gha_scripts/trigger_pages.sh
